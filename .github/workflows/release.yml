# @exposes #cicd to #supply-chain [critical] cwe:CWE-829 -- "[external] Release workflow holds id-token:write for OIDC npm publishing; unpinned actions/checkout@v4 and actions/setup-node@v4 could be compromised to publish malicious packages to the entire GuardLink npm user base"
# @audit #cicd -- "Pin all actions to SHA hashes before the release pipeline runs; the OIDC trusted publish flow is correct but depends on action integrity upstream"
# @flows ExternalActions -> #cicd via uses -- "Third-party action code has implicit write access to npm registry via OIDC token in release context"
# @handles secrets on #cicd -- "GITHUB_TOKEN with id-token:write permission used for npm OIDC trusted publishing (--provenance flag)"
# @comment -- "npm publish --provenance --access public runs after tests pass; OIDC token issued by GitHub OIDC provider, not a stored secret"

name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install latest npm (trusted publishing requires >=11.5.1)
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Publish to npm with OIDC trusted publishing
        run: npm publish --provenance --access public
