# @exposes #cicd to #supply-chain [high] cwe:CWE-829 -- "[external] actions/checkout@v4 and actions/setup-node@v4 use mutable tag refs; a compromised upstream action tag executes arbitrary code with GITHUB_TOKEN in the CI runner"
# @audit #cicd -- "Pin actions to immutable SHA hashes (e.g. actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683) to prevent tag-redirect supply chain attacks"
# @flows ExternalActions -> #cicd via uses -- "Third-party GitHub Action code injected into CI runner environment"
# @comment -- "CI runs on ubuntu-latest; guardlink validate/status dogfood steps use the built dist artifact, not a published package"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: GuardLink validate (dogfood)
        run: node dist/cli/index.js validate .

      - name: GuardLink status
        run: node dist/cli/index.js status .
